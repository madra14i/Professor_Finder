<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CREATE AN ACCOUNT</title>
    <link rel="stylesheet" href="css/create.css">

</head>
<body>

    <div class="container">

        <div class="logo-box">
            <img src="assets/images/logo.png" id="cvsu-logo">
            <h2>CvSU-Main</h2>
            <p>PROFESSOR FINDER</p>
        </div>

        <div class="create-transp-box">
            <h1>Create Account</h1>
            <form class="input-form">

                <div class="inpName">
                    <label>
                        <input type="text" id="full-name" placeholder="FULL NAME" required>
                    </label>
                </div>

                <div class="inpEmail">
                    <label>
                        <input type="email" id="cvsu-email" placeholder="CVSU EMAIL" required>
                    </label>
                </div>

                <div class="inpStudennt-num">
                    <label>
                        <input type="text" id="Student-num" minlength="0" maxlength="9" placeholder="STUDENT NUMBER" required>
                    </label> 
                </div>

                <div class="inpPass">
                    <label>
                        <input type="password" id="password" placeholder="PASSWORD" required> 
                    </label> 
                </div>

                <div class="terms-con">
                    <label>
                        <input type="checkbox" id="terms" required><a href="">I AGREE IN TERMS AND CONDITIONS</a>
                    </label>
                </div>

                <div class="login-btn">
                    <button type="submit" id="log-btn">LOGIN</button>
                </div>
            </form>
            
        </div>
    </div>
    

</body>
</html>
