<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link rel="stylesheet" href="css/index.css">

</head>
<body>
    
    <div class="container">

        <div class="logo-box">
            <img src="assets/images/logo.png" id="cvsu-logo">
            <h2>CvSU-Main</h2>
            <p>PROFESSOR FINDER</p>
        </div>

        <div class="login-transp-box">
            <h1>Login</h1>
            <form class="input-form">
                <div class="inpStudennt-num">
                    <label>
                        <input type="text" id="Student-num" minlength="0" maxlength="9" placeholder="STUDENT NUMBER" required>
                    </label> 
                </div>

                <div class="inpPass">
                    <label>
                        <input type="password" id="password" placeholder="PASSWORD" required> 
                    </label> 
                </div>

                <div class="remember-me">
                    <label>
                        <input type="checkbox" id="remember">REMEMBER ME
                    </label>
                </div>

                <div class="login-btn">
                    <button type="submit" id="log-btn">LOGIN</button>
                </div>
            </form>
            
            <div class="create-forgot">
                <a href="create.html">CREATE AN ACCOUNT</a>
                <span style="color: white; margin: 0px 10px 0px 10px;">|</span>
                <a href="#">FORGOT PASSWORD?</a>
            </div>
        </div>
    </div>
    

</body>
</html>
